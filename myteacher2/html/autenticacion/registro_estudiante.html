<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registro Estudiante — myTEACHER</title>
    <link rel="stylesheet" href="../../css/style.css" />
  </head>
  <body>
    <div class="auth-page">
      <!-- Logo -->
      <a
        href="../../index.html"
        class="auth-logo"
        style="text-decoration: none"
      >
        <div class="auth-logo-icon">
          <div class="logo-icon-inner">
            <div class="bar1"></div>
            <div class="bar2"></div>
          </div>
        </div>
        <div class="auth-logo-text">
          <span class="my">my</span><span class="teacher">TEACHER</span>
        </div>
      </a>

      <!-- Card -->
      <div class="auth-card auth-card-wide">
        <div class="auth-title">Crear cuenta</div>
        <div class="auth-subtitle">Elige o cambia el tipo de cuenta</div>

        <!-- Selector tipo usuario -->
        <div class="user-type-selector">
          <a
            href="registro_tutor.html"
            class="user-type-btn"
            style="text-decoration: none"
          >
            <div class="type-icon">🎓</div>
            <div class="type-label">Soy Tutor</div>
            <div class="type-desc">Quiero enseñar</div>
          </a>
          <a
            href="registro_estudiante.html"
            class="user-type-btn active"
            style="text-decoration: none"
          >
            <div class="type-icon">📚</div>
            <div class="type-label">Soy Estudiante</div>
            <div class="type-desc">Quiero aprender</div>
          </a>
        </div>

        <form action="../estudiantes/panel_estudiante.html" method="GET">
          <!-- Datos comunes -->
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 16px">
            <div class="form-group">
              <label class="form-label">Nombre</label>
              <input
                type="text"
                class="form-input"
                placeholder="Tu nombre"
                required
              />
            </div>
            <div class="form-group">
              <label class="form-label">Apellido</label>
              <input
                type="text"
                class="form-input"
                placeholder="Tu apellido"
                required
              />
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">Email</label>
            <input
              type="email"
              class="form-input"
              placeholder="tu@email.com"
              required
            />
          </div>

          <div class="form-group">
            <label class="form-label">Ciudad</label>
            <input
              type="text"
              class="form-input"
              placeholder="Tu ciudad"
              required
            />
          </div>

          <div class="form-group">
            <label class="form-label">Contraseña</label>
            <input
              type="password"
              class="form-input"
              placeholder="Mínimo 8 caracteres"
              required
              minlength="8"
            />
          </div>

          <div class="form-group">
            <label class="form-label">Confirmar contraseña</label>
            <input
              type="password"
              class="form-input"
              placeholder="Repite tu contraseña"
              required
              minlength="8"
            />
          </div>

          <button
            type="submit"
            class="btn-primary"
            style="
              width: 100%;
              display: block;
              text-align: center;
              margin-top: 8px;
              border: none;
              cursor: pointer;
            "
          >
            Crear cuenta como Estudiante
          </button>
        </form>

        <div class="auth-footer" style="margin-top: 20px">
          ¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a>
        </div>
      </div>
    </div>
  </body>
</html>
