<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tutoría Confirmada — myTEACHER</title>
  <link rel="stylesheet" href="../../css/style.css" />
</head>
<body>

  <nav class="navbar">
    <a href="../../index.html" class="logo">
      <div class="logo-icon"><div class="logo-icon-inner"><div class="bar1"></div><div class="bar2"></div></div></div>
      <div class="logo-text"><span class="my">my</span><span class="teacher">TEACHER</span></div>
    </a>
    <div class="nav-links">
      <a href="../../index.html">Inicio</a>
      <a href="../tutor/busqueda_tutores.html">Buscar Tutores</a>
      <a href="index.html#como-funciona">Cómo Funciona</a>
    </div>
    <div class="nav-actions">
      <div class="nav-avatar">
        <div class="avatar-circle">SM</div>
        <span style="color:#364153; font-size:14px; font-weight:500;">demo</span>
      </div>
    </div>
  </nav>

  <div class="confirmacion-page">
    <div class="confirmacion-card">

      <!-- Ícono check -->
      <div class="confirmacion-icon">
        <svg class="check-icon" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
          <circle cx="20" cy="20" r="18" stroke="#00C950" stroke-width="3"/>
          <path d="M12 20l6 6 10-12" stroke="#00C950" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
      </div>

      <div class="confirmacion-title">¡Tutoría confirmada!</div>
      <div class="confirmacion-sub" id="confirm-sub">Tu sesión con Sofía Martínez ha sido agendada.</div>

      <div class="confirmacion-detail">
        <div class="detail-row">
          <span class="detail-lbl">Tutor</span>
          <span class="detail-val" id="confirm-name">Sofía Martínez</span>
        </div>
        <div class="detail-row">
          <span class="detail-lbl">Fecha</span>
          <span class="detail-val" id="confirm-date">14 Marzo 2026</span>
        </div>
        <div class="detail-row">
          <span class="detail-lbl">Hora</span>
          <span class="detail-val" id="confirm-time">14:00</span>
        </div>
        <div class="detail-row">
          <span class="detail-lbl">Modalidad</span>
          <span class="detail-val" id="confirm-mod">Presencial</span>
        </div>
        <div class="detail-row">
          <span class="detail-lbl">Precio</span>
          <span class="detail-val" id="confirm-price">$25.000</span>
        </div>
      </div>

      <a href="../estudiantes/panel_estudiante.html" class="btn-secondary" style="width:100%; display:block; text-align:center;">
        Ir a mi dashboard
      </a>

    </div>
  </div>

  <script>
    // Objeto con la información de los tutores
    // Sirve como "base de datos" local para obtener los detalles según el ID
    const tutores = {
      sofia: {
        name: "Sofía Martínez",
        price: "$25.000",
      },
      carlos: {
        name: "Carlos Rodríguez",
        price: "$30.000",
      },
      yuki: {
        name: "Yuki Tanaka",
        price: "$22.000",
      },
      mario: {
        name: "Mario Blanco",
        price: "$28.000",
      },
      amara: {
        name: "Amara Johnson",
        price: "$35.000",
      },
      david: {
        name: "David Moreno",
        price: "$20.000",
      },
    };

    // Extraer parámetros de la URL
    const params = new URLSearchParams(window.location.search);
    const id = params.get("id");
    const mod = params.get("mod");
    const dia = params.get("dia");
    const hora = params.get("hora");

    // Si el ID existe y corresponde a un tutor válido en nuestra lista
    if (id && tutores[id]) {
      const t = tutores[id];

      // Actualizar el texto del subtítulo con el nombre dinámico
      const confirmSub = document.getElementById("confirm-sub");
      if (confirmSub) {
        confirmSub.textContent = `Tu sesión con ${t.name} ha sido agendada.`;
      }

      // Actualizar el nombre del tutor en la tabla de detalles
      const confirmName = document.getElementById("confirm-name");
      if (confirmName) {
        confirmName.textContent = t.name;
      }

      // Actualizar el precio de la tutoría
      const confirmPrice = document.getElementById("confirm-price");
      if (confirmPrice) {
        confirmPrice.textContent = t.price;
      }
    }

    // Actualizar la modalidad (incluso si no hay id de tutor)
    if (mod) {
      const confirmMod = document.getElementById("confirm-mod");
      if (confirmMod) {
        confirmMod.textContent = mod;
      }
    }
    
    // Actualizar la fecha
    if (dia) {
      const confirmDate = document.getElementById("confirm-date");
      if (confirmDate) {
        // Asumiendo que el año es 2026 si no se especifica
        confirmDate.textContent = dia + (dia.includes("2026") ? "" : " 2026");
      }
    }
    
    // Actualizar la hora
    if (hora) {
      const confirmTime = document.getElementById("confirm-time");
      if (confirmTime) {
        confirmTime.textContent = hora;
      }
    }
  </script>
</body>
</html>
