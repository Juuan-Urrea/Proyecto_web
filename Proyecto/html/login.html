<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Iniciar sesión — myTEACHER</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <div class="auth-page">

    <!-- Logo -->
    <div class="auth-logo">
      <div class="auth-logo-icon">
        <div class="logo-icon-inner">
          <div class="bar1"></div>
          <div class="bar2"></div>
        </div>
      </div>
      <div class="auth-logo-text">
        <span class="my">my</span><span class="teacher">TEACHER</span>
      </div>
    </div>

    <!-- Card -->
    <div class="auth-card">
      <div class="auth-title">Bienvenido/a</div>
      <div class="auth-subtitle">Inicia sesión para continuar aprendiendo</div>

      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" class="form-input" placeholder="tu@email.com" />
      </div>

      <div class="form-group">
        <label class="form-label">Contraseña</label>
        <input type="password" class="form-input" placeholder="••••••••" />
        <div style="text-align:right; margin-top:4px;">
          <a href="#" class="form-link">¿Olvidaste tu contraseña?</a>
        </div>
      </div>

      <a href="panel_estudiante.html" class="btn-primary" style="width:100%; display:block; text-align:center; margin-top:8px;">
        Iniciar sesión
      </a>

      <div class="auth-footer" style="margin-top:20px;">
        ¿No tienes cuenta? <a href="registro_estudiante.html">Regístrate gratis</a>
      </div>
    </div>

  </div>
</body>
</html>
