<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Registro Tutor — myTEACHER</title>
  <link rel="stylesheet" href="../css/style.css" />
</head>
<body>
  <div class="auth-page">

    <div class="auth-logo">
      <div class="auth-logo-icon"><div class="logo-icon-inner"><div class="bar1"></div><div class="bar2"></div></div></div>
      <div class="auth-logo-text"><span class="my">my</span><span class="teacher">TEACHER</span></div>
    </div>

    <div class="auth-card auth-card-wide">
      <div class="auth-title">Crear cuenta</div>
      <div class="auth-subtitle">Elige o cambia el tipo de tutor</div>

      <div class="user-type-selector">
        <div class="user-type-btn active">
          <div class="type-icon">🎓</div>
          <div class="type-label">Soy Tutor</div>
          <div class="type-desc">Quiero enseñar</div>
        </div>
        <div class="user-type-btn">
          <div class="type-icon">📚</div>
          <div class="type-label">Soy Estudiante</div>
          <div class="type-desc">Quiero aprender</div>
        </div>
      </div>

      <div style="display:grid; grid-template-columns:1fr 1fr; gap:16px;">
        <div class="form-group">
          <label class="form-label">Nombre</label>
          <input type="text" class="form-input" placeholder="Tu nombre" />
        </div>
        <div class="form-group">
          <label class="form-label">Apellido</label>
          <input type="text" class="form-input" placeholder="Tu apellido" />
        </div>
      </div>

      <div class="form-group">
        <label class="form-label">Email</label>
        <input type="email" class="form-input" placeholder="tu@email.com" />
      </div>

      <div class="form-group">
        <label class="form-label">Ciudad</label>
        <input type="text" class="form-input" placeholder="Tu ciudad" />
      </div>

      <div class="form-group">
        <label class="form-label">Materias que enseñas</label>
        <select class="form-select">
          <option>Selecciona una materia</option>
          <option>Matemáticas</option>
          <option>Física</option>
          <option>Química</option>
          <option>Programación</option>
          <option>Inglés</option>
        </select>
      </div>

      <div class="form-group">
        <label class="form-label">Experiencia docente</label>
        <textarea class="form-textarea" placeholder="Describe tu experiencia..."></textarea>
      </div>

      <div class="form-group">
        <label class="form-label">Contraseña</label>
        <input type="password" class="form-input" placeholder="Mínimo 8 caracteres" />
      </div>

      <div class="form-group">
        <label class="form-label">Confirmar contraseña</label>
        <input type="password" class="form-input" placeholder="Repite tu contraseña" />
      </div>

      <a href="panel_tutor.html" class="btn-primary" style="width:100%; display:block; text-align:center; margin-top:8px;">
        Crear cuenta como Tutor
      </a>

      <div class="auth-footer" style="margin-top:20px;">
        ¿Ya tienes cuenta? <a href="login.html">Inicia sesión</a>
      </div>
    </div>

  </div>
</body>
</html>
